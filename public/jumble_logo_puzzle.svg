  <!-- Wordmark shadow -->
  <text x="108" y="102" text-anchor="start" dominant-baseline="central" font-family="Poppins, sans-serif" font-weight="800" font-size="48" fill="#1e2a4a" letter-spacing="-2" style="fill:rgb(30, 42, 74);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Poppins, sans-serif;font-size:48px;font-weight:800;text-anchor:start;dominant-baseline:central">jumble</text>
  <!-- Wordmark main -->
  <text x="104" y="98" text-anchor="start" dominant-baseline="central" font-family="Poppins, sans-serif" font-weight="800" font-size="48" fill="#1e293b" letter-spacing="-2" style="fill:rgb(30, 41, 59);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Poppins, sans-serif;font-size:48px;font-weight:800;text-anchor:start;dominant-baseline:central">
    <tspan fill="#D85A30" style="fill:rgb(216, 90, 48);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Poppins, sans-serif;font-size:48px;font-weight:800;text-anchor:start;dominant-baseline:central">j</tspan>umble
  </text>

